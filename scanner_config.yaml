# Stock Scanner — Konfiguration v2 (26.03.2026)
# Datengetrieben optimiert basierend auf 119 aufgeloesten Signalen.
# Alle Schwellenwerte fuer CFD-Signale, Scoring und Backtesting.

# --- CFD Filter ---
cfd:
  # ADX-Schwellenwerte (Sweet Spot: 30-42, Penalty ab 45)
  adx_min: 30
  adx_sweet_max: 42          # optimaler Bereich (76% Win bei 35-39)
  adx_overripe: 45           # Penalty wenn ADX zu hoch (ueberreifer Trend)

  # RSI-Zonen
  rsi_long_min: 45
  rsi_long_max: 62
  rsi_short_min: 38
  rsi_short_max: 55

  # ATR-Qualitaetsfilter (% vom Kurs)
  atr_pct_min: 1.0
  atr_pct_max: 8.0

  # Trend-Reife: Minimum Tage mit gehaltener MA-Struktur
  trend_maturity_min_days: 3

  # Volume
  vol_ratio_min: 1.2
  vol_ratio_bonus: 2.0

  # Gap-Filter
  max_gap_pct: 5.0

  # ATR-Multiplikatoren fuer Stop/TP
  atr_stop_mult: 1.5
  atr_tp1_mult: 1.5
  atr_tp2_mult: 2.0           # gesenkt von 3.0 — 0 TP2-Hits bei altem Wert

  # Top-N Cap pro Richtung (Qualitaet > Quantitaet)
  top_n: 5

  # Short-spezifisch
  short_score_cap: 7.5        # Short Score 8+ = 28% Win → Cap bei 7.5
  short_resolve_max_days: 5   # Shorts schneller expiren (17/23 Expired waren Shorts)

# --- Gewichtetes Scoring ---
scoring:
  weights:
    adx_di:       2.0         # ADX + DI-Bestaetigung
    ma_structure:  1.5         # Kern-Trendrichtung (Price > SMA20 > SMA50)
    ema_stack:     1.5         # Kurzfrist-Momentum (EMA9/21)
    macd:          1.0         # MACD Histogram Momentum
    rsi_zone:      1.0         # RSI in Zone
    volume:        0.5         # Volumen-Bestaetigung
    no_gap:        0.5         # Kein Gap > 5%

  # Bonus-Punkte (gedeckelt auf max_bonus)
  bonus:
    trend_maturity_days: 5     # +0.5 wenn 5-15 Tage
    trend_maturity_pts: 0.5
    trend_overripe_days: 15    # Penalty wenn Trend aelter als 15 Tage
    trend_overripe_penalty: -0.5
    vol_ratio_high: 2.0
    vol_ratio_pts: 0.5
    squeeze_fire_pts: 0.5
    max_bonus: 1.0             # gesenkt von 2.0 — Score 7-7.9 performt besser als 8+

  # Penalties (neu)
  penalty:
    adx_overripe_pts: -0.5     # ADX > 45 = ueberreifer Trend
    gap_soft_pct: 4.0          # ab 4% Gap kippt die Performance deutlich
    gap_soft_pts: -0.5
    gap_hard_pct: 6.0          # 6%+ war im Backtest klar toxisch
    gap_hard_pts: -1.0
    atr_high_pct: 3.0          # hohes ATR-Regime vorsichtiger behandeln
    atr_high_pts: -0.3
    short_bias_pts: -0.4       # Shorts historisch klar schwaecher

  market_adjustments:
    long:
      NASDAQ 100: -0.2
      DAX 40: -0.3
    short:
      NASDAQ 100: -0.6
      DAX 40: -0.8

  # Threshold fuer CFD-Signal
  threshold: 5.0
  max_score: 9.0               # 8.0 Basis + 1.0 Bonus (vorher 10.0)

# --- Hauptscan ---
main_scan:
  min_score: 4
  max_gap_pct: 3.0

# --- Backtesting ---
backtesting:
  db_file: "cfd_backtesting.db"
  resolve_after_days: 1
  resolve_max_days: 7          # gesenkt von 10 — weniger Expired
  enabled: true
